<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alemão Vargas Moreira</title>
  <script>
    // Redireciona rotas do React Router para index.html no GitHub Pages
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
